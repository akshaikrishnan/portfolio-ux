<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font-mono); background: var(--surface); padding: 24px; }
.row { display: flex; gap: 20px; align-items: flex-end; }
.item { display: flex; flex-direction: column; gap: 8px; align-items: center; }
.box { width: 56px; height: 40px; background: var(--surface-3); border: 2px solid var(--border); }
.lbl { font-size: 9px; font-weight: 500; color: var(--text-muted); text-align: center; line-height: 1.4; }
.dividers { margin-top: 20px; display: flex; gap: 16px; align-items: center; }
.div-item { display: flex; flex-direction: column; gap: 6px; }
.div-line { width: 60px; }
</style>
</head><body>
<div class="row">
  <div class="item">
    <div class="box" style="border-radius:0px;"></div>
    <div class="lbl">--radius-none<br>0px · default</div>
  </div>
  <div class="item">
    <div class="box" style="border-radius:2px;"></div>
    <div class="lbl">--radius-xs<br>2px · sticky notes</div>
  </div>
  <div class="item">
    <div class="box" style="border-radius:4px;"></div>
    <div class="lbl">--radius-sm<br>4px · tooltips</div>
  </div>
  <div class="item">
    <div class="box" style="border-radius:999px; width:80px;"></div>
    <div class="lbl">--radius-full<br>pill · badges</div>
  </div>
</div>
<div class="dividers">
  <div class="div-item">
    <div class="div-line" style="border-top: 2px solid #0A0A0A;"></div>
    <div class="lbl">2px --border</div>
  </div>
  <div class="div-item">
    <div class="div-line" style="border-top: 2px solid #DDDDDD;"></div>
    <div class="lbl">2px --border-light</div>
  </div>
  <div class="div-item">
    <div class="div-line" style="border-top: 2px solid #0066FF;"></div>
    <div class="lbl">2px --border-accent</div>
  </div>
</div>
</body></html>

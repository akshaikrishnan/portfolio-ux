<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font-sans); background: var(--surface); padding: 20px; }
.row { display: flex; gap: 12px; align-items: stretch; }
.chip { border: 2px solid var(--border); padding: 12px 16px; display: flex; flex-direction: column; gap: 6px; min-width: 140px; }
.chip-label { font-family: var(--font-mono); font-size: 9px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); }
.chip-name { font-family: var(--font-mono); font-size: 11px; font-weight: 500; }
.dot { width: 28px; height: 28px; border: 2px solid var(--border); border-radius: 50%; }
.muted-dot { width: 28px; height: 28px; border: 2px solid var(--border); border-radius: 50%; }
</style>
</head><body>
<div class="row">
  <div class="chip">
    <span class="chip-label">State</span>
    <div class="dot" style="background:#00CC66;"></div>
    <span class="chip-name" style="color:#00CC66;">Success</span>
    <span style="font-family:var(--font-mono);font-size:9px;color:var(--text-muted);">#00CC66</span>
  </div>
  <div class="chip">
    <span class="chip-label">State</span>
    <div class="dot" style="background:#FF9900;"></div>
    <span class="chip-name" style="color:#FF9900;">Warning</span>
    <span style="font-family:var(--font-mono);font-size:9px;color:var(--text-muted);">#FF9900</span>
  </div>
  <div class="chip">
    <span class="chip-label">State</span>
    <div class="dot" style="background:#FF3B00;"></div>
    <span class="chip-name" style="color:#FF3B00;">Error</span>
    <span style="font-family:var(--font-mono);font-size:9px;color:var(--text-muted);">#FF3B00</span>
  </div>
  <div class="chip">
    <span class="chip-label">State</span>
    <div class="dot" style="background:#CCCCCC;"></div>
    <span class="chip-name" style="color:#999;">Inactive</span>
    <span style="font-family:var(--font-mono);font-size:9px;color:var(--text-muted);">#CCCCCC</span>
  </div>
  <div class="chip">
    <span class="chip-label">Border</span>
    <div style="height:28px;border:3px solid #0A0A0A;"></div>
    <span class="chip-name">--border</span>
    <span style="font-family:var(--font-mono);font-size:9px;color:var(--text-muted);">#0A0A0A 2px</span>
  </div>
  <div class="chip">
    <span class="chip-label">Border</span>
    <div style="height:28px;border:2px solid #DDDDDD;"></div>
    <span class="chip-name">--border-light</span>
    <span style="font-family:var(--font-mono);font-size:9px;color:var(--text-muted);">#DDDDDD 2px</span>
  </div>
</div>
</body></html>

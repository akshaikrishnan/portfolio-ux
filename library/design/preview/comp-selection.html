<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font-sans); background: var(--canvas-bg);
  background-image: radial-gradient(circle, rgba(0,0,0,0.12) 1px, transparent 1px);
  background-size: 24px 24px; padding: 32px; }
.row { display: flex; gap: 32px; flex-wrap: wrap; }
.frame-wrap { position: relative; }
.frame-label-sel { font-family: var(--font-mono); font-size: 10px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: #0066FF; margin-bottom: 4px; }
.handle { width: 8px; height: 8px; background: #fff; border: 1.5px solid #0066FF; position: absolute; z-index: 2; }
/* Hover selection */
.sel-hover { width: 200px; height: 100px; border: 1.5px dashed #0066FF; position: relative; display: flex; align-items: center; justify-content: center; }
/* Click selection */
.sel-click { width: 200px; height: 100px; background: #fff; border: 2px solid #0066FF; box-shadow: 0 0 0 3px rgba(0,102,255,0.2); position: relative; display: flex; align-items: center; justify-content: center; }
/* resize handles at corners */
.h-tl { top: -5px; left: -5px; }
.h-tc { top: -5px; left: 50%; transform: translateX(-50%); }
.h-tr { top: -5px; right: -5px; }
.h-ml { top: 50%; left: -5px; transform: translateY(-50%); }
.h-mr { top: 50%; right: -5px; transform: translateY(-50%); }
.h-bl { bottom: -5px; left: -5px; }
.h-bc { bottom: -5px; left: 50%; transform: translateX(-50%); }
.h-br { bottom: -5px; right: -5px; }
.inner-text { font-size: 13px; color: #555; font-family: var(--font-mono); }
</style>
</head><body>
<div class="row">
  <div>
    <div class="frame-label-sel">hover · brief dashed</div>
    <div style="position:relative;">
      <div class="sel-hover">
        <span class="inner-text">element / hover</span>
      </div>
    </div>
  </div>
  <div>
    <div class="frame-label-sel">click · persistent selected</div>
    <div style="position:relative;">
      <div class="sel-click">
        <div class="handle h-tl"></div>
        <div class="handle h-tc"></div>
        <div class="handle h-tr"></div>
        <div class="handle h-ml"></div>
        <div class="handle h-mr"></div>
        <div class="handle h-bl"></div>
        <div class="handle h-bc"></div>
        <div class="handle h-br"></div>
        <span class="inner-text">element / selected</span>
      </div>
    </div>
  </div>
</div>
</body></html>

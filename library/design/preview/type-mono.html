<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font-mono); background: var(--surface-2); padding: 24px; }
.specimen { border-bottom: 1px solid var(--border-light); padding: 10px 0; display: flex; align-items: baseline; gap: 20px; }
.specimen:last-child { border-bottom: none; }
.meta { font-family: var(--font-mono); font-size: 9px; color: var(--text-muted); width: 110px; flex-shrink: 0; line-height: 1.5; }
</style>
</head><body>
<div class="specimen">
  <div class="meta">frame-label<br>11px / 500<br>UPPERCASE</div>
  <div style="font-family:var(--font-mono);font-size:11px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-secondary);">FRAME 01 / HERO</div>
</div>
<div class="specimen">
  <div class="meta">annotation<br>13px / 400</div>
  <div style="font-family:var(--font-mono);font-size:13px;font-weight:400;color:var(--text-secondary);">layer: headline — position: 48, 120</div>
</div>
<div class="specimen">
  <div class="meta">inspect value<br>11px / 500<br>accent color</div>
  <div style="font-family:var(--font-mono);font-size:11px;font-weight:500;letter-spacing:0.04em;color:#0066FF;">font-size: 80 · weight: 700 · #0A0A0A</div>
</div>
<div class="specimen">
  <div class="meta">micro / ruler<br>9px / 500</div>
  <div style="font-family:var(--font-mono);font-size:9px;font-weight:500;color:var(--text-muted);">0 · 64 · 128 · 192 · 256 · 320 · 384</div>
</div>
<div class="specimen">
  <div class="meta">cursor label<br>11px / 500</div>
  <div style="font-family:var(--font-mono);font-size:11px;font-weight:500;background:#0A0A0A;color:#fff;padding:3px 8px;display:inline-block;">Designer</div>
</div>
</body></html>

<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font-sans); background: var(--surface); padding: 24px; }
.specimen { border-bottom: 1px solid var(--border-light); padding: 10px 0; display: flex; align-items: baseline; gap: 20px; }
.specimen:last-child { border-bottom: none; }
.meta { font-family: var(--font-mono); font-size: 9px; color: var(--text-muted); width: 100px; flex-shrink: 0; line-height: 1.5; }
</style>
</head><body>
<div class="specimen">
  <div class="meta">--t-3xl / 80px<br>bold / –0.03em</div>
  <div style="font-family:var(--font-sans);font-size:80px;font-weight:700;line-height:0.95;letter-spacing:-0.03em;color:var(--text-primary);">Display</div>
</div>
<div class="specimen">
  <div class="meta">--t-2xl / 56px<br>bold / –0.03em</div>
  <div style="font-family:var(--font-sans);font-size:56px;font-weight:700;line-height:1.05;letter-spacing:-0.03em;color:var(--text-primary);">Heading One</div>
</div>
<div class="specimen">
  <div class="meta">--t-xl / 36px<br>bold / –0.02em</div>
  <div style="font-family:var(--font-sans);font-size:36px;font-weight:700;line-height:1.1;letter-spacing:-0.02em;color:var(--text-primary);">Section Heading</div>
</div>
<div class="specimen">
  <div class="meta">--t-lg / 24px<br>bold / 0</div>
  <div style="font-family:var(--font-sans);font-size:24px;font-weight:700;line-height:1.2;color:var(--text-primary);">Card Title / H3</div>
</div>
</body></html>
